name: EAS Build

on:
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to build'
        required: true
        default: 'android'
        type: choice
        options:
          - android
          - ios
          - all
      profile:
        description: 'Build profile'
        required: true
        default: 'preview'
        type: choice
        options:
          - preview
          - production

jobs:
  build:
    name: EAS Build (${{ github.event.inputs.platform }})
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: cd mobile && npm install

      - name: Build Android APK
        if: github.event.inputs.platform == 'android' || github.event.inputs.platform == 'all'
        run: cd mobile && eas build --platform android --profile ${{ github.event.inputs.profile }} --non-interactive

      - name: Build iOS IPA
        if: github.event.inputs.platform == 'ios' || github.event.inputs.platform == 'all'
        run: cd mobile && eas build --platform ios --profile ${{ github.event.inputs.profile }} --non-interactive
